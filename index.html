<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Settlement</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background: #0a3d0a;
            color: #fff;
            font-size: 1.1em;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            background: #1a5f1a;
            padding: 20px;
            border-radius: 12px;
        }
        h1 { 
            text-align: center; 
            color: #ffd700; 
            margin-bottom: 5px; 
            font-size: 1.9em; 
        }
        .subtitle {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.05em;
        }
        .input-row {
            display: flex;
            align-items: center;
            margin: 12px 0;
            gap: 10px;
        }
        .input-row label {
            width: 110px;
            flex-shrink: 0;
        }
        input, button, select {
            padding: 10px;
            font-size: 1em;
            border-radius: 6px;
        }
        input {
            flex: 1;
        }
        button {
            background: #ffd700;
            color: #0a3d0a;
            font-weight: bold;
            border: none;
            padding: 12px;
            width: 100%;
            margin: 15px 0;
            font-size: 1.1em;
            cursor: pointer;
        }
        button:hover {
            background: #ffed80;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #0a3d0a;
            border-radius: 8px;
            min-height: 80px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐺 Wolf Settlement</h1>
        <p class="subtitle">4 players • $1 per point</p>
        
        <div class="input-row">
            <label>Player 1:</label>
            <input type="text" id="p1" placeholder="Player name" value="">
            <input type="number" id="pts1" placeholder="points" style="width: 90px;">
        </div>
        
        <div class="input-row">
            <label>Player 2:</label>
            <input type="text" id="p2" placeholder="Player name" value="">
            <input type="number" id="pts2" placeholder="points" style="width: 90px;">
        </div>
        
        <div class="input-row">
            <label>Player 3:</label>
            <input type="text" id="p3" placeholder="Player name" value="">
            <input type="number" id="pts3" placeholder="points" style="width: 90px;">
        </div>
        
        <div class="input-row">
            <label>Player 4:</label>
            <input type="text" id="p4" placeholder="Player name" value="">
            <input type="number" id="pts4" placeholder="points" style="width: 90px;">
        </div>
        
        <button onclick="calculateSettlement()">Calculate Settlement</button>
        
        <div class="result" id="result"></div>
    </div>

    <script>
        function calculateSettlement() {
            const players = [
                {name: document.getElementById('p1').value || "Player 1", points: parseFloat(document.getElementById('pts1').value) || 0},
                {name: document.getElementById('p2').value || "Player 2", points: parseFloat(document.getElementById('pts2').value) || 0},
                {name: document.getElementById('p3').value || "Player 3", points: parseFloat(document.getElementById('pts3').value) || 0},
                {name: document.getElementById('p4').value || "Player 4", points: parseFloat(document.getElementById('pts4').value) || 0}
            ];

            let totalPoints = players.reduce((sum, p) => sum + p.points, 0);
            let html = "<strong>Settlement:</strong><br>";

            players.forEach(p => {
                if (p.points !== 0) {
                    const amount = (p.points * 1).toFixed(2);
                    html += `${p.name}: <strong>$${amount}</strong><br>`;
                }
            });

            html += `<br><strong>Total Points:</strong> ${totalPoints}`;
            
            document.getElementById('result').innerHTML = html;
        }
    </script>
</body>
</html>
