<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Settlement</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background: #0a3d0a;
            color: #fff;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            background: #1a5f1a;
            padding: 20px;
            border-radius: 12px;
        }
        h1 { 
            text-align: center; 
            color: #ffd700; 
            margin: 10px 0 5px;
        }
        .subtitle { text-align: center; margin-bottom: 20px; }
        .row {
            display: flex;
            align-items: center;
            margin: 12px 0;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
        }
        input[type="number"] {
            width: 90px;
            padding: 10px;
        }
        button {
            background: #ffd700;
            color: #0a3d0a;
            font-weight: bold;
            border: none;
            padding: 12px;
            width: 100%;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 1.1em;
        }
        .small-btn {
            padding: 10px;
            margin: 5px 0;
            font-size: 1em;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #0a3d0a;
            border-radius: 8px;
            min-height: 140px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐺 Wolf Settlement</h1>
        <p class="subtitle">4 players • $1 per point</p>
        
        <div class="row">
            <input type="text" id="p1" placeholder="Player 1 name" value="">
            <input type="number" id="pts1" placeholder="points" value="">
        </div>
        <div class="row">
            <input type="text" id="p2" placeholder="Player 2 name" value="">
            <input type="number" id="pts2" placeholder="points" value="">
        </div>
        <div class="row">
            <input type="text" id="p3" placeholder="Player 3 name" value="">
            <input type="number" id="pts3" placeholder="points" value="">
        </div>
        <div class="row">
            <input type="text" id="p4" placeholder="Player 4 name" value="">
            <input type="number" id="pts4" placeholder="points" value="">
        </div>

        <button onclick="calculateSettlement()">Calculate Settlement</button>
        
        <button class="small-btn" onclick="saveRound()">💾 Save This Round</button>
        <button class="small-btn" onclick="loadRound()">📂 Load Last Round</button>

        <div class="result" id="result"></div>
    </div>

    <script>
        function calculateSettlement() {
            const players = [
                {name: (document.getElementById('p1').value.trim() || "Player 1"), points: Math.round(parseFloat(document.getElementById('pts1').value) || 0)},
                {name: (document.getElementById('p2').value.trim() || "Player 2"), points: Math.round(parseFloat(document.getElementById('pts2').value) || 0)},
                {name: (document.getElementById('p3').value.trim() || "Player 3"), points: Math.round(parseFloat(document.getElementById('pts3').value) || 0)},
                {name: (document.getElementById('p4').value.trim() || "Player 4"), points: Math.round(parseFloat(document.getElementById('pts4').value) || 0)}
            ];

            const totalPoints = players.reduce((sum, p) => sum + p.points, 0);
            const avg = totalPoints / 4;

            let html = "<strong>Settlement (minimal transfers):</strong><br><br>";

            players.forEach(p => p.net = p.points - avg);

            const debtors = players.filter(p => p.net < 0).sort((a, b) => a.net - b.net);
            const creditors = players.filter(p => p.net > 0).sort((a, b) => b.net - a.net);

            let i = 0, j = 0;
            while (i < debtors.length && j < creditors.length) {
                let debt = -debtors[i].net;
                let credit = creditors[j].net;
                let amount = Math.min(debt, credit);

                if (amount >= 1) {
                    html += `${debtors[i].name} pays ${creditors[j].name} <strong>$${Math.round(amount)}</strong><br>`;
                }

                debtors[i].net += amount;
                creditors[j].net -= amount;

                if (debtors[i].net > -0.5) i++;
                if (creditors[j].net < 0.5) j++;
            }

            html += `<br><strong>Total Points: ${totalPoints}</strong>`;
            document.getElementById('result').innerHTML = html;
        }

        function saveRound() {
            const data = {
                p1: document.getElementById('p1').value,
                p2: document.getElementById('p2').value,
                p3: document.getElementById('p3').value,
                p4: document.getElementById('p4').value,
                pts1: document.getElementById('pts1').value,
                pts2: document.getElementById('pts2').value,
                pts3: document.getElementById('pts3').value,
                pts4: document.getElementById('pts4').value
            };
            localStorage.setItem('wolfSettlement', JSON.stringify(data));
            alert("Round saved!");
        }

        function loadRound() {
            const data = JSON.parse(localStorage.getItem('wolfSettlement'));
            if (data) {
                document.getElementById('p1').value = data.p1 || "";
                document.getElementById('p2').value = data.p2 || "";
                document.getElementById('p3').value = data.p3 || "";
                document.getElementById('p4').value = data.p4 || "";
                document.getElementById('pts1').value = data.pts1 || "";
                document.getElementById('pts2').value = data.pts2 || "";
                document.getElementById('pts3').value = data.pts3 || "";
                document.getElementById('pts4').value = data.pts4 || "";
                alert("Last round loaded!");
                calculateSettlement();
            } else {
                alert("No saved round found.");
            }
        }
    </script>
</body>
</html>
