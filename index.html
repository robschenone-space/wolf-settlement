<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolf Settlement</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
      background: #0a3d0a;
      color: #fff;
      font-size: 1.1em;
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
      background: #1a5f1a;
      padding: 20px;
      border-radius: 12px;
    }
    h1 { 
      text-align: center; 
      color: #ffd700; 
      margin-bottom: 5px; 
      font-size: 1.9em; 
    }
    .subtitle { 
      text-align: center; 
      margin-bottom: 20px; 
      font-size: 1.05em; 
    }
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px;
      font-size: 1.1em;
      border-radius: 6px;
      border: none;
    }
    input[type="number"] {
      width: 85px;
      padding: 12px;
      font-size: 1.1em;
      border-radius: 6px;
      border: none;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 15px;
      font-size: 1.15em;
      background: #ffd700;
      color: #0a3d0a;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      margin: 8px 0;
    }
    .clear-btn {
      background: #ff6666;
      color: white;
    }
    .result {
      margin-top: 20px;
      padding: 18px;
      background: #0f4a0f;
      border-radius: 8px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐺 Wolf Settlement</h1>
    <p class="subtitle">4 players • $1 per point</p>
    
    <div id="players"></div>
    
    <button onclick="calculate()">Calculate Settlement</button>
    <button onclick="saveRound()">💾 Save This Round</button>
    <button onclick="loadLastRound()">📂 Load Last Round</button>
    <button onclick="clearAll()" class="clear-btn">🗑️ Clear All</button>
    
    <div id="result" class="result"></div>
  </div>

  <script>
    function init() {
      const container = document.getElementById('players');
      for (let i = 0; i < 4; i++) {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
          <input type="text" id="name${i}" placeholder="Player name">
          <input type="number" id="points${i}" placeholder="pts">
        `;
        container.appendChild(row);
      }
    }

    function calculate() {
      let players = [];
      let totalPoints = 0;

      for (let i = 0; i < 4; i++) {
        const name = document.getElementById(`name${i}`).value.trim() || `Player ${i+1}`;
        const points = parseFloat(document.getElementById(`points${i}`).value) || 0;
        players.push({name, points});
        totalPoints += points;
      }

      // Correct math
      players.forEach(p => p.net = 4 * p.points - totalPoints);

      let html = "<strong>Final Results</strong><br><br>";
      players.forEach(p => {
        const sign = p.net >= 0 ? '+' : '';
        html += `${p.name}: ${p.points} pts → <strong>${sign}$${Math.abs(p.net)}</strong><br>`;
      });

      html += `<br><strong>Minimal Payments:</strong><br>`;

      const receivers = players.filter(p => p.net > 0).sort((a,b) => b.net - a.net);
      const payers = players.filter(p => p.net < 0).sort((a,b) => a.net - b.net);

      let transactions = [];
      payers.forEach(payer => {
        let remaining = -payer.net;
        receivers.forEach(receiver => {
          if (remaining <= 0) return;
          const pay = Math.min(remaining, receiver.net);
          if (pay > 0) {
            transactions.push(`${payer.name} pays ${receiver.name} $${pay}`);
            remaining -= pay;
            receiver.net -= pay;
          }
        });
      });

      if (transactions.length === 0) {
        html += "Everyone is even — no payments needed.";
      } else {
        transactions.forEach(t => html += `• ${t}<br>`);
      }

      document.getElementById('result').innerHTML = html;
    }

    function saveRound() {
      let data = [];
      for (let i = 0; i < 4; i++) {
        data.push({
          name: document.getElementById(`name${i}`).value.trim(),
          points: document.getElementById(`points${i}`).value
        });
      }
      localStorage.setItem('wolfRound', JSON.stringify(data));
      alert("✅ Round Saved!");
    }

    function loadLastRound() {
      const saved = localStorage.getItem('wolfRound');
      if (saved) {
        const data = JSON.parse(saved);
        for (let i = 0; i < 4; i++) {
          if (data[i]) {
            document.getElementById(`name${i}`).value = data[i].name || '';
            document.getElementById(`points${i}`).value = data[i].points || '';
          }
        }
        alert("📂 Loaded!");
        calculate();
      } else {
        alert("No saved round found.");
      }
    }

    function clearAll() {
      if (confirm("Clear all fields?")) {
        for (let i = 0; i < 4; i++) {
          document.getElementById(`name${i}`).value = '';
          document.getElementById(`points${i}`).value = '';
        }
        document.getElementById('result').innerHTML = '';
      }
    }

    window.onload = init;
  </script>
</body>
</html>
