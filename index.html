<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolf Settlement</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 15px; 
      background: #0a3d0a; 
      color: #fff; 
      font-size: 1.15em; 
    }
    .container { 
      max-width: 500px; 
      margin: 0 auto; 
      background: #1a5f1a; 
      padding: 20px; 
      border-radius: 12px; 
    }
    h1 { text-align: center; color: #ffd700; margin-bottom: 8px; font-size: 1.9em; }
    p { text-align: center; margin-bottom: 20px; font-size: 1.1em; }
    .row { 
      display: flex; 
      gap: 8px; 
      margin: 16px 0; 
      align-items: center; 
    }
    input[type="text"] { 
      flex: 2.2; 
      padding: 13px; 
      font-size: 1.2em; 
      border-radius: 6px; 
      border: none; 
    }
    input[type="number"] { 
      flex: 0.35; 
      padding: 13px; 
      font-size: 1.2em; 
      border-radius: 6px; 
      border: none; 
    }
    button { 
      width: 100%; 
      padding: 16px; 
      font-size: 1.2em; 
      background: #ffd700; 
      color: #0a3d0a; 
      border: none; 
      border-radius: 8px; 
      font-weight: bold; 
      margin: 12px 0; 
    }
    .result { 
      margin-top: 20px; 
      padding: 20px; 
      background: #0f4a0f; 
      border-radius: 8px; 
      line-height: 1.9; 
      font-size: 1.15em; 
    }
    .positive { color: #90EE90; font-weight: bold; }
    .negative { color: #FF9999; font-weight: bold; }
    .saved { margin-top: 15px; font-size: 1.05em; color: #ffd700; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐺 Wolf Settlement</h1>
    <p>4 players • $1 per point</p>

    <div id="players"></div>

    <button onclick="calculate()">Calculate Settlement</button>
    <button onclick="saveRound()">💾 Save This Round</button>
    <button onclick="loadLastRound()">📂 Load Last Round</button>

    <div id="result" class="result"></div>
    <div id="savedStatus" class="saved"></div>
  </div>

  <script>
    function init() {
      const container = document.getElementById('players');
      for (let i = 0; i < 4; i++) {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
          <input type="text" id="name${i}" placeholder="Player name">
          <input type="number" id="points${i}" placeholder="Points">
        `;
        container.appendChild(row);
      }
    }

    function calculate() {
      let players = [];
      let totalPoints = 0;

      for (let i = 0; i < 4; i++) {
        const name = document.getElementById(`name${i}`).value.trim() || `Player ${i+1}`;
        const points = parseInt(document.getElementById(`points${i}`).value) || 0;
        players.push({name, points});
        totalPoints += points;
      }

      players.forEach(p => p.net = 4 * p.points - totalPoints);

      let html = `<h2>Final Results</h2>`;
      players.forEach(p => {
        const sign = p.net >= 0 ? '+' : '';
        html += `<div><strong>${p.name}:</strong> ${p.points} pts → <span class="${p.net >= 0 ? 'positive' : 'negative'}">${sign}$${Math.abs(p.net)}</span></div>`;
      });

      html += `<h3>Minimal Payments</h3>`;
      const receivers = players.filter(p => p.net > 0).sort((a,b) => b.net - a.net);
      const payers = players.filter(p => p.net < 0).sort((a,b) => a.net - b.net);

      let transactions = [];
      payers.forEach(payer => {
        let remaining = -payer.net;
        receivers.forEach(receiver => {
          if (remaining <= 0) return;
          const pay = Math.min(remaining, receiver.net);
          if (pay > 0) {
            transactions.push(`${payer.name} pays ${receiver.name} $${pay}`);
            remaining -= pay;
            receiver.net -= pay;
          }
        });
      });

      transactions.forEach(t => html += `<div>• ${t}</div>`);

      document.getElementById('result').innerHTML = html;
    }

    function saveRound() {
      let data = [];
      for (let i = 0; i < 4; i++) {
        data.push({
          name: document.getElementById(`name${i}`).value.trim(),
          points: document.getElementById(`points${i}`).value
        });
      }
      localStorage.setItem('lastWolfRound', JSON.stringify(data));
      document.getElementById('savedStatus').innerHTML = '✅ Saved!';
      setTimeout(() => document.getElementById('savedStatus').innerHTML = '', 1500);
    }

    function loadLastRound() {
      const saved = localStorage.getItem('lastWolfRound');
      if (saved) {
        const data = JSON.parse(saved);
        for (let i = 0; i < 4; i++) {
          if (data[i]) {
            document.getElementById(`name${i}`).value = data[i].name || '';
            document.getElementById(`points${i}`).value = data[i].points || '';
          }
        }
        document.getElementById('savedStatus').innerHTML = '📂 Loaded';
        setTimeout(() => document.getElementById('savedStatus').innerHTML = '', 1500);
        calculate();
      }
    }

    window.onload = init;
  </script>
</body>
</html>
