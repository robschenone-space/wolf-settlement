<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Settlement</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background: #0a3d0a;
            color: #fff;
            font-size: 1.15em;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            background: #1a5f1a;
            padding: 20px;
            border-radius: 12px;
        }
        h1 { text-align: center; color: #ffd700; margin-bottom: 8px; font-size: 1.9em; }
        p { text-align: center; margin-bottom: 12px; font-size: 1.05em; }
        .row {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            padding: 8px 0;
            border-bottom: 1px solid #555;
        }
        input, button, select {
            padding: 8px;
            font-size: 1em;
        }
        button {
            background: #ffd700;
            color: #0a3d0a;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #ffed80;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #0a3d0a;
            border-radius: 8px;
            min-height: 60px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wolf Settlement</h1>
        <p>Settlement / Agreement Calculator</p>
        
        <div class="row">
            <label>Claim Amount:</label>
            <input type="number" id="claim" placeholder="Enter amount" value="100000">
        </div>
        
        <div class="row">
            <label>Settlement %:</label>
            <input type="number" id="percent" placeholder="e.g. 65" value="65">
        </div>
        
        <button onclick="calculateSettlement()">Calculate Settlement</button>
        
        <div class="result" id="result"></div>
    </div>

    <script>
        function calculateSettlement() {
            const claim = parseFloat(document.getElementById('claim').value);
            const percent = parseFloat(document.getElementById('percent').value);
            
            if (!claim || !percent) {
                document.getElementById('result').innerHTML = "Please enter valid numbers.";
                return;
            }
            
            const settlement = claim * (percent / 100);
            const savings = claim - settlement;
            
            document.getElementById('result').innerHTML = `
                <strong>Settlement Amount:</strong> $${settlement.toLocaleString()}<br>
                <strong>You Save:</strong> $${savings.toLocaleString()}<br><br>
                <em>Wolf Settlement approved at ${percent}%</em>
            `;
        }
        
        // Run once on load
        window.onload = calculateSettlement;
    </script>
</body>
</html>
